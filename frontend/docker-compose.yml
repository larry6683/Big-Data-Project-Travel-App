version: '3.8'

services:
  frontend: 
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: travel-frontend
    env_file:
      - .env.frontend 
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - wanderplan-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  wanderplan-network:
    name: wanderplan-network # Explicitly names the network so other compose files can join it
    driver: bridge

volumes:
  frontend_node_modules:
    driver: local